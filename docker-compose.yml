name: gibassets

services:
  postgres:
    container_name: gibassets-postgres
    build:
      context: .
      dockerfile: Dockerfile.postgres
      tags:
        - gibsfinance/postgres:latest
    shm_size: 16g
    command: ['postgres']
    ports:
      - 5876:5432
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - gibassets
    environment:
      - POSTGRES_DB=gibassets
      - POSTGRES_USER=gibassets
      - POSTGRES_PASSWORD=password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gibassets -d gibassets"]
      interval: 5s
      timeout: 5s
      retries: 5
  postgres-migrate:
    container_name: gibassets-postgres-migrate
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -cx "yarn run db:migrate-latest && yarn run db:seed"
    networks:
      - gibassets
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages:/usr/src/app/packages
      - ./package.json:/usr/src/app/package.json
      - ./yarn.lock:/usr/src/app/yarn.lock
      - ./.yarnrc.yml:/usr/src/app/.yarnrc.yml
    environment:
      DEBUG: '${DEBUG:-📷*}'
      DATABASE_URL: 'postgres://gibassets:password@postgres:5432/gibassets'
  collect:
    container_name: gibassets-collect
    build:
      context: .
      dockerfile: Dockerfile.worker
      tags:
        - gibsfinance/assets:latest
    command: ['yarn', 'run', 'collect']
    volumes:
      - ./missing:/usr/src/app/missing
      - ./packages:/usr/src/app/packages
      - ./submodules:/usr/src/app/submodules
    depends_on:
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully
    networks:
      - gibassets
    environment:
      DATABASE_URL: 'postgres://gibassets:password@postgres:5432/gibassets'
      FAKE_SPINNER: 'true'
      RPC_56: $RPC_56
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q yarn"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  server:
    container_name: gibassets-server
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - gibsfinance/assets:latest
    command: ['yarn', 'run', 'server']
    volumes:
      - ./packages:/usr/src/app/packages
    depends_on:
      postgres:
        condition: service_healthy
      postgres-migrate:
        condition: service_completed_successfully
    networks:
      - gibassets
    environment:
      ROOT_URI: 'http://localhost:3456'
      DATABASE_URL: 'postgres://gibassets:password@postgres:5432/gibassets'
      RPC_56: $RPC_56
    ports:
      - 3456:3000
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  gibassets:
    driver: bridge

volumes:
  gibassets:
    external: true
