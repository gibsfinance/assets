name: CI
on: push

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: cd packages/server && yarn lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: npx tsc --noEmit -p packages/server/tsconfig.json

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: yarn run build

  # Legacy `node --test` files. The bulk of the suite is vitest — see the
  # `vitest` job below.
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: node --import tsx --test packages/server/test/db-batch.test.ts

  # The vitest suites — ~1,900 tests that previously ran in no push-triggered
  # workflow at all, so a broken test could reach staging or master unnoticed.
  # One job per package so a failure names the package that broke, and
  # fail-fast is off so one red package still reports the rest.
  vitest:
    name: vitest (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { package: utils, workspace: '@gibs/utils' }
          - { package: sdk, workspace: '@gibs/sdk' }
          - { package: react, workspace: '@gibs/react' }
          - { package: ui, workspace: ui }
          - { package: server, workspace: server }
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: yarn workspace ${{ matrix.workspace }} run vitest run

  # Coverage is gated at 100% (thresholds live in each package's vitest.config).
  # Kept separate from `vitest` on purpose: a failing test and a coverage
  # shortfall are different problems, and merging them would mask a real
  # regression behind a standing shortfall.
  coverage:
    name: coverage (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { package: utils, workspace: '@gibs/utils' }
          - { package: sdk, workspace: '@gibs/sdk' }
          - { package: react, workspace: '@gibs/react' }
          - { package: ui, workspace: ui }
          - { package: server, workspace: server }
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: yarn workspace ${{ matrix.workspace }} run vitest run --coverage

  browser-test:
    runs-on: ubuntu-latest
    # No `playwright install` at all: the browser-binary CDN downloads hang on
    # hosted runners (observed twice — the first artifact downloads in ~40s, then a
    # follow-up download stalls silently until the job times out). The runner image
    # ships Google Chrome preinstalled; PLAYWRIGHT_CHROME_CHANNEL routes the
    # playwright provider to it (see packages/ui/vitest.browser.config.ts).
    timeout-minutes: 15
    env:
      PLAYWRIGHT_CHROME_CHANNEL: chrome
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: yarn workspace ui run test:browser

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - uses: docker/setup-buildx-action@v3
      - run: yarn install --immutable
      - run: yarn run build
      - name: Build Docker images with cache
        uses: docker/bake-action@v6
        with:
          load: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
      - name: Start services and wait for health
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d postgres
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up postgres-migrate
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d server
          for i in $(seq 1 30); do
            if [ "$(docker inspect --format='{{.State.Health.Status}}' gibassets-server 2>/dev/null)" = "healthy" ]; then
              echo "Server is healthy"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
      - run: yarn run test
