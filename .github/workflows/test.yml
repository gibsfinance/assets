name: CI
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 23.6.1
      - run: npm install
      # start the docker database
      # start node server
      - run: npm run build
      - run: docker compose build
      - run: docker compose up -d gibassets-postgres gibassets-collect gibassets-server
      - run: sleep 30
      - run: npm test
