name: CI
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 23.6.1
      - run: yarn --frozen-lockfile
      # start the docker database
      # start node server
      - run: yarn run build
      - run: docker compose build
      - run: docker compose up -d postgres collect server
      - run: yarn run test
