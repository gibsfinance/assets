name: CI
on: push

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: cd packages/server && yarn lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: npx tsc --noEmit -p packages/server/tsconfig.json

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: yarn run build

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: node --import tsx --test packages/server/test/sync-order.test.ts packages/server/test/db-batch.test.ts

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: yarn run build
      - run: docker compose build
      - name: Start services and wait for health
        run: |
          docker compose up -d postgres
          docker compose up postgres-migrate
          docker compose up -d server
          for i in $(seq 1 30); do
            if [ "$(docker inspect --format='{{.State.Health.Status}}' gibassets-server 2>/dev/null)" = "healthy" ]; then
              echo "Server is healthy"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
      - run: yarn run test
