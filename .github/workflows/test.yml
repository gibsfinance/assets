name: CI
on: push

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: cd packages/server && yarn lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: npx tsc --noEmit -p packages/server/tsconfig.json

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: yarn run build

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - run: node --import tsx --test packages/server/test/sync-order.test.ts packages/server/test/db-batch.test.ts

  browser-test:
    runs-on: ubuntu-latest
    # The playwright browser download can wedge indefinitely (observed: a job stuck
    # 2+ hours on `playwright install`). Bound the job and cache the browsers so the
    # download only happens when the playwright version changes.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn install --immutable
      - name: Resolve playwright version for cache key
        id: playwright-version
        run: echo "version=$(yarn workspace ui exec playwright --version | tr ' ' '-')" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      # No --with-deps: its apt phase hangs on hosted runners (observed: download
      # completes in 41s, then 14.5 minutes of silence until the timeout kills it),
      # and GitHub's ubuntu images already ship every Chromium system dependency.
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn workspace ui exec playwright install chromium
      - run: yarn workspace ui run test:browser

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - run: corepack enable
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'yarn'
      - uses: docker/setup-buildx-action@v3
      - run: yarn install --immutable
      - run: yarn run build
      - name: Build Docker images with cache
        uses: docker/bake-action@v6
        with:
          load: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
      - name: Start services and wait for health
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d postgres
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up postgres-migrate
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d server
          for i in $(seq 1 30); do
            if [ "$(docker inspect --format='{{.State.Health.Status}}' gibassets-server 2>/dev/null)" = "healthy" ]; then
              echo "Server is healthy"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
      - run: yarn run test
